<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bars & Beats Radio - Live Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Global Styles */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{background:#121212;color:#fff;scroll-behavior:smooth;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;outline:none;font-family:'Roboto',sans-serif;}

/* Header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  position:fixed;
  top:0;
  width:100%;
  background:rgba(18,18,18,0.95);
  z-index:1000;
  border-bottom:1px solid #333;
}
.nav-left{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}
.nav-left a{
  font-weight:500;
  color:#fff;
  font-size:1rem;
  transition:0.3s;
}
.nav-left a:hover{color:orange;}
.logo-circle{
  width:60px;
  height:60px;
  border-radius:50%;
  overflow:hidden;
  background:#1a1a1a;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-circle img{width:50px;height:50px;}

/* Hero / Radio Player */
.hero-radio{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?fit=crop&w=1600&q=80') center/cover no-repeat;
  position:relative;
  overflow:hidden;
  text-align:center;
}
.hero-radio::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,0,0,0.7);
}
.hero-radio h1{
  position:relative;z-index:2;
  font-family:'Orbitron',sans-serif;
  font-size:3rem;
  color:orange;
  margin-bottom:20px;
}
.hero-radio p{
  position:relative;z-index:2;
  font-size:1.3rem;
  color:#fff;
  margin-bottom:30px;
}

/* Waveform Animation */
.waveform-radio{
  position:absolute;bottom:50px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:4px;z-index:1;
}
.waveform-radio div{
  width:6px;height:20px;background:orange;border-radius:3px;animation:wave 1s infinite ease-in-out;
}
.waveform-radio div:nth-child(2){animation-delay:0.1s;}
.waveform-radio div:nth-child(3){animation-delay:0.2s;}
.waveform-radio div:nth-child(4){animation-delay:0.3s;}
.waveform-radio div:nth-child(5){animation-delay:0.4s;}
@keyframes wave{0%,100%{height:20px;}50%{height:80px;}}

/* Live Stream Player */
.radio-player{
  display:flex;
  flex-direction:column;
  align-items:center;
  background:rgba(30,30,30,0.9);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px orange;
  max-width:500px;
  width:90%;
  margin-top:20px;
}
.radio-player audio{
  width:100%;
  margin-top:10px;
}
.radio-info{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:15px;
}
.radio-info span{
  font-weight:bold;
  font-size:1.2rem;
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* Footer / Player */
.player{
  position:fixed;bottom:0;width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:10px 30px;z-index:999;
  background:rgba(30,30,30,0.9);backdrop-filter:blur(10px);
  border-top:2px solid orange;border-radius:15px 15px 0 0;
  box-shadow:0 -5px 30px rgba(255,127,80,0.8);
  flex-wrap:wrap;
}
.player-left{display:flex;align-items:center;gap:15px;min-width:180px;}
.player-left img{width:70px;height:70px;border-radius:50%;object-fit:cover;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.track-info{display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.track-info span{font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-controls{display:flex;align-items:center;gap:15px;margin:10px 0;}
.player-controls button{
  background:none;border:none;color:#fff;font-size:1.5rem;transition:0.3s;display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;border:1px solid #555;
}
.player-controls button:hover{background:orange;color:#121212;}
.progress-container{flex:1;height:6px;background:#333;margin:0 10px;border-radius:3px;overflow:hidden;min-width:120px;}
.progress{width:0%;height:100%;background:linear-gradient(90deg, orange, #ffb347);transition:width 0.1s linear;}
.live-indicator{display:flex;align-items:center;gap:5px;color:red;font-weight:bold;margin-right:10px;}
.volume{display:flex;align-items:center;gap:5px;margin-left:10px;}
.volume input{width:100px;}

/* Responsive */
@media(max-width:768px){
  .hero-radio h1{font-size:2rem;}
  .hero-radio p{font-size:1rem;}
  .nav-left{gap:10px;font-size:0.9rem;}
  .player-left img{width:60px;height:60px;}
  .player-controls button{width:35px;height:35px;}
  .progress-container{margin:0 5px;}
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <nav class="nav-left">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="artists.html">Music</a>
    <a href="blog.html">Blog</a>
    <a href="albums.html">Album</a>
    <a href="submit.html">Submit Track</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="logo-circle">
    <img src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jjbf4dqtipl1ju013s69ie100017.png" alt="Bars & Beats Radio Logo">
  </div>
</header>

<!-- Hero / Live Radio Player -->
<section class="hero-radio">
  <h1>LIVE RADIO</h1>
  <p id="now-playing-radio">NOW PLAYING: Loading...</p>
  <div class="waveform-radio">
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="radio-player">
    <div class="radio-info">
      <span id="radio-track-title">Bars & Beats Radio Live</span>
      <span id="radio-artist">24/7 Hip Hop • Beats</span>
    </div>
    <audio id="radio-stream" controls autoplay>
      <source src="https://icecast.freestreams.org:8000/stream.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>
</section>

<!-- Footer / Player -->
<div class="player">
  <div class="player-left">
    <img id="album-art" src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jjbf4dqtipl1ju013s69ie100017.png" alt="Album Art">
    <div class="track-info">
      <span id="track-title">Track Title</span>
      <span id="track-artist">Artist Name</span>
    </div>
  </div>
  <div class="player-controls">
    <button id="prev"><svg width="20" height="20" fill="currentColor"><polygon points="15,0 15,20 0,10"/></svg></button>
    <button id="play"><svg width="20" height="20" fill="currentColor"><polygon points="0,0 20,10 0,20"/></svg></button>
    <button id="next"><svg width="20" height="20" fill="currentColor"><polygon points="0,0 0,20 15,10"/></svg></button>
  </div>
  <div class="progress-container">
    <div class="progress" id="progress"></div>
  </div>
  <div class="live-indicator"><span>●</span>LIVE</div>
  <div class="volume">
    🔊 <input type="range" min="0" max="1" step="0.01" id="volume">
  </div>
</div>

<script>
// Footer Player Script
const tracks=[
  {title:"Free Hip-Hop Beat",artist:"Public CC",src:"https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/PublicDomain/FreeHipHopBeat.mp3",art:"https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jjbf4dqtipl1ju013s69ie100017.png"},
  {title:"Upbeat Groove",artist:"Free Sample",src:"https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/PublicDomain/UpbeatGroove.mp3",art:"https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jjbf4dqtipl1ju013s69ie100017.png"},
  {title:"Trap Beat Loop",artist:"Royalty Free",src:"https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/PublicDomain/TrapBeatLoop.mp3",art:"https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jjbf4dqtipl1ju013s69ie100017.png"}
];
let currentTrack=0;
const audio=new Audio();
audio.src=tracks[currentTrack].src;

const albumArt=document.getElementById('album-art');
const trackTitle=document.getElementById('track-title');
const trackArtist=document.getElementById('track-artist');
const nowPlaying=document.getElementById('now-playing-radio');
const progress=document.getElementById('progress');
const playBtn=document.getElementById('play');

function updatePlayer(){
  albumArt.src=tracks[currentTrack].art;
  trackTitle.textContent=tracks[currentTrack].title;
  trackArtist.textContent=tracks[currentTrack].artist;
  nowPlaying.innerHTML=`NOW PLAYING: ${tracks[currentTrack].title} – ${tracks[currentTrack].artist}`;
}

function playTrackIndex(index){
  currentTrack=index;
  audio.src=tracks[currentTrack].src;
  audio.play();
  playBtn.innerHTML='<svg width="20" height="20" fill="currentColor"><rect width="8" height="20"/><rect x="12" width="8" height="20"/></svg>';
  updatePlayer();
}

document.getElementById('next').addEventListener('click',()=>{
  currentTrack=(currentTrack+1)%tracks.length;
  playTrackIndex(currentTrack);
});
document.getElementById('prev').addEventListener('click',()=>{
  currentTrack=(currentTrack-1+tracks.length)%tracks.length;
  playTrackIndex(currentTrack);
});
playBtn.addEventListener('click',()=>{
  if(audio.paused){
    audio.play();
    playBtn.innerHTML='<svg width="20" height="20" fill="currentColor"><rect width="8" height="20"/><rect x="12" width="8" height="20"/></svg>';
  }else{
    audio.pause();
    playBtn.innerHTML='<svg width="20" height="20" fill="currentColor"><polygon points="0,0 20,10 0,20"/></svg>';
  }
});
audio.addEventListener('timeupdate',()=>{
  const percent=(audio.currentTime/audio.duration)*100||0;
  progress.style.width=percent+'%';
});
audio.addEventListener('ended',()=>{
  currentTrack=(currentTrack+1)%tracks.length;
  playTrackIndex(currentTrack);
});
document.getElementById('volume').addEventListener('input',(e)=>{
  audio.volume=e.target.value;
});

// Initialize
updatePlayer();
</script>

</body>
</html>
